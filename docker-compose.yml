services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: coord
      POSTGRES_PASSWORD: coord
      POSTGRES_DB: coorddb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coord -d coorddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://coord:coord@db:5432/coorddb?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
      GOOGLE_MAPS_SERVER_API_KEY: ${GOOGLE_MAPS_SERVER_API_KEY:-}
      API_PUBLIC_PREFIX: /api
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@koordinator.local}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

  # Voliteľný HTTPS tunel pre iPhone (GPS, push). Spusti: npm run docker:up:tunnel
  tunnel:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://caddy:80
    depends_on:
      - caddy
    restart: unless-stopped

volumes:
  pg_data:
  caddy_data:
  caddy_config:
